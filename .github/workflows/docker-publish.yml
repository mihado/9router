name: Build and Push Docker Image

# Hardened downstream fork: builds and publishes ONLY from the `hardened` branch,
# ONLY to our GHCR. master is never built. See AGENTS.md / docs/SECURITY-REVIEW.md.
on:
  push:
    branches: [hardened]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: "Skip unit tests (debug builds only — do not use for releases)"
        type: boolean
        default: false
        required: false

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # Belt-and-suspenders: never build anything but `hardened`, even if the
      # trigger above is ever misconfigured or run via workflow_dispatch on another ref.
      - name: Guard — refuse to build non-hardened refs
        run: |
          if [ "${{ github.ref }}" != "refs/heads/hardened" ]; then
            echo "::error::This workflow only builds the 'hardened' branch (got ${{ github.ref }})."
            exit 1
          fi

      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run security-relevant unit tests
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.skip_tests != true }}
        working-directory: tests
        run: |
          # `tests` is a pnpm workspace member (pnpm-workspace.yaml), so the root
          # `pnpm install --frozen-lockfile` step above already covers it.
          # Security-adjacent tests only. The full suite has ~48 pre-existing
          # failures (missing chalk, snapshot drift, security-audit mismatches)
          # tracked separately; gating on those blocks every push. This subset
          # covers the auth/guard surface touched by hardening commits.
          npx vitest run --reporter=default \
            unit/dashboard-guard.test.js \
            unit/auth-login.test.js \
            unit/settings-password.test.js \
            unit/buildOutputFilter.test.js \
            unit/free-provider-toggle.test.js \
            unit/search-ssrf-guard.test.js

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.GHCR_IMAGE }}
          tags: |
            type=raw,value=hardened
            type=sha,format=short
            type=raw,value={{date 'YYYYMMDD'}}-{{sha}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: GIT_SHA=${{ github.sha }}
          cache-from: type=registry,ref=${{ env.GHCR_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.GHCR_IMAGE }}:buildcache,mode=max
          platforms: linux/amd64
          provenance: false
          sbom: false
